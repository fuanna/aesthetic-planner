<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Schedule & Corkboard Planner</title>
    <!-- Google Fonts for exquisite English & Arabic typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Cairo:wght@300;400;600;700&family=Montserrat:ital,wght@0,300;0,500;0,700;1,300&family=Quicksand:wght@300;500;700&family=Tajawal:wght@300;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Amiri:ital@0;1&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #faf5ef;
            --coquette-pink: #fbcbc9;
            --pastel-blue: #cbdadb;
            --lana-wine: #72251f;
            --lana-blue: #8090a8;
            --shadow-sm: 0 4px 10px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 20px rgba(0,0,0,0.1);
            --font-primary: 'Quicksand', 'Tajawal', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-cream);
            font-family: var(--font-primary);
            color: #3e3835;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Nav Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(224, 209, 194, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Hamburger Menu Icon */
        .menu-trigger {
            background: none;
            border: none;
            font-size: 26px;
            color: var(--lana-wine);
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-trigger:hover {
            background: rgba(114, 37, 31, 0.08);
        }

        .logo {
            font-family: 'Playfair Display', 'Amiri', serif;
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            color: var(--lana-wine);
            text-decoration: none;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-right-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-tabs {
            display: flex;
            gap: 15px;
        }

        .tab-btn {
            background: none;
            border: 2px solid transparent;
            padding: 10px 24px;
            font-size: 16px;
            font-family: var(--font-primary);
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            color: #726259;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: rgba(251, 203, 201, 0.3);
            color: var(--lana-wine);
        }

        .tab-btn.active {
            background: var(--coquette-pink);
            color: #fff;
            box-shadow: var(--shadow-sm);
        }

        .lang-toggle-btn {
            background: white;
            border: 1px solid #e0d1c2;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: var(--font-primary);
            font-weight: 600;
            font-size: 14px;
            color: var(--lana-wine);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lang-toggle-btn:hover {
            background: var(--coquette-pink);
            color: white;
            border-color: var(--coquette-pink);
        }

        /* Slide-out Sidebar Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .drawer-overlay.open {
            display: block;
            opacity: 1;
        }

        .drawer-menu {
            position: fixed;
            top: 0;
            right: -320px; /* Hidden offscreen on RTL */
            width: 320px;
            height: 100vh;
            background: #fff;
            box-shadow: -5px 0 25px rgba(0,0,0,0.15);
            z-index: 2001;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1), left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* LTR adjustments for drawer position */
        html[dir="ltr"] .drawer-menu {
            right: auto;
            left: -320px;
        }

        .drawer-overlay.open .drawer-menu {
            right: 0;
        }

        html[dir="ltr"] .drawer-overlay.open .drawer-menu {
            left: 0;
            right: auto;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #f5ece6;
            padding-bottom: 15px;
        }

        .drawer-title {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-weight: bold;
            color: var(--lana-wine);
            font-size: 20px;
        }

        .close-drawer-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #8c7b72;
        }

        .boards-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
        }

        .board-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #faf8f5;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #e0d1c2;
            cursor: pointer;
            transition: all 0.2s;
        }

        .board-list-item:hover {
            background: var(--coquette-pink);
            color: white;
            border-color: var(--coquette-pink);
        }

        .board-list-item.active {
            background: var(--lana-wine);
            color: white;
            border-color: var(--lana-wine);
        }

        .board-name-text {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .board-item-delete {
            background: none;
            border: none;
            cursor: pointer;
            color: inherit;
            opacity: 0.7;
            font-size: 14px;
            padding: 2px;
        }

        .board-item-delete:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* App Containers */
        .page-container {
            display: none;
            padding: 30px 40px;
            animation: fadeIn 0.5s ease;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar Control Center */
        .app-layout {
            display: flex;
            gap: 30px;
            flex-direction: row-reverse; /* Default for RTL */
        }

        html[dir="ltr"] .app-layout {
            flex-direction: row; /* Adjusted for LTR */
        }

        @media (max-width: 1024px) {
            .app-layout, html[dir="ltr"] .app-layout {
                flex-direction: column-reverse;
            }
        }

        .control-panel {
            flex: 0 0 320px;
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(224, 209, 194, 0.4);
            height: fit-content;
        }

        .main-workspace {
            flex: 1;
        }

        /* Form elements */
        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--lana-wine);
            border-bottom: 2px dashed var(--coquette-pink);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #726259;
        }

        .control-btn {
            width: 100%;
            background: #faf6f5;
            border: 1px solid #e0d1c2;
            padding: 12px;
            border-radius: 12px;
            font-family: var(--font-primary);
            font-size: 14px;
            color: #5c4e46;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .control-btn:hover {
            background: var(--coquette-pink);
            color: white;
            border-color: var(--coquette-pink);
        }

        .control-btn.accent {
            background: var(--lana-wine);
            color: #fff;
            border-color: var(--lana-wine);
        }

        .control-btn.accent:hover {
            opacity: 0.9;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e0d1c2;
            font-family: var(--font-primary);
            font-size: 14px;
            color: #5c4e46;
            background: #fafcfc;
            outline: none;
            transition: border 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--coquette-pink);
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .color-swatch {
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: #5c4e46;
        }

        /* Color Picker Custom Styling */
        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fafcfc;
            border: 1px solid #e0d1c2;
            padding: 10px;
            border-radius: 12px;
        }

        .custom-color-circle {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            background-color: transparent;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .custom-color-circle::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .custom-color-circle::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        /* SCHEDULE PAGES LAYOUTS */
        .layout-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .layout-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e0d1c2;
            background: white;
            cursor: pointer;
            font-family: var(--font-primary);
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .layout-btn.active {
            background: var(--coquette-pink);
            color: white;
            border-color: var(--coquette-pink);
        }

        /* Renderable Canvas for Schedule */
        .schedule-canvas {
            background: #fff;
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(224, 209, 194, 0.4);
            min-height: 700px;
            position: relative;
            overflow: hidden;
        }

        /* Customizable Schedule Styles */
        .schedule-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .schedule-title {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 36px;
            font-weight: bold;
            color: var(--lana-wine);
            outline: none;
            display: inline-block;
            border-bottom: 2px dashed transparent;
        }

        .schedule-title:focus {
            border-bottom-color: var(--coquette-pink);
        }

        .schedule-subtitle {
            font-family: 'Caveat', 'Tajawal', cursive;
            font-size: 22px;
            color: #8c7b72;
            margin-top: 5px;
            outline: none;
            display: inline-block;
        }

        /* Style 1: Timeline Layout (Wonyoungism style) */
        .timeline-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .timeline-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px;
            border-radius: 12px;
            transition: background 0.2s;
            position: relative;
        }

        .timeline-item:hover {
            background: #faf6f5;
        }

        .item-actions {
            position: absolute;
            left: 10px;
            display: none;
            gap: 5px;
        }

        html[dir="ltr"] .item-actions {
            left: auto;
            right: 10px;
        }

        .timeline-item:hover .item-actions {
            display: flex;
        }

        .action-btn {
            background: white;
            border: 1px solid #e0d1c2;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .action-btn:hover {
            background: var(--coquette-pink);
            color: white;
        }

        .item-time {
            font-weight: 700;
            color: var(--lana-wine);
            min-width: 100px;
            outline: none;
        }

        .item-separator {
            color: var(--coquette-pink);
            font-weight: bold;
        }

        .item-text {
            outline: none;
            flex: 1;
            font-size: 16px;
        }

        /* Timeline Sidebar Image Frame */
        .timeline-sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .aesthetic-frame {
            width: 100%;
            height: 320px;
            border-radius: 20px;
            overflow: hidden;
            border: 8px solid #fff;
            box-shadow: var(--shadow-sm);
            position: relative;
            cursor: pointer;
            background: #f5ece6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .aesthetic-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .aesthetic-frame input[type="file"] {
            display: none;
        }

        /* Style 2: Grid/Weekly Calendar (Lana honeymoon style) */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .grid-header-day {
            text-align: center;
            font-weight: 700;
            padding: 10px;
            background: var(--coquette-pink);
            color: white;
            border-radius: 12px;
            font-size: 14px;
        }

        .grid-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 400px;
            background: #faf9f6;
            padding: 8px;
            border-radius: 12px;
            border: 1px dashed #e0d1c2;
            position: relative;
        }

        .grid-card {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
            border-left: 4px solid var(--coquette-pink);
        }

        html[dir="rtl"] .grid-card {
            border-left: none;
            border-right: 4px solid var(--coquette-pink);
        }

        .grid-card:hover {
            transform: translateY(-2px);
        }

        .grid-card-time {
            font-size: 11px;
            font-weight: bold;
            color: #8c7b72;
            margin-bottom: 5px;
            outline: none;
        }

        .grid-card-text {
            font-size: 13px;
            outline: none;
        }

        .grid-card-actions {
            position: absolute;
            top: 5px;
            right: 5px;
            display: none;
        }

        html[dir="rtl"] .grid-card-actions {
            right: auto;
            left: 5px;
        }

        .grid-card:hover .grid-card-actions {
            display: block;
        }

        .grid-add-btn {
            background: rgba(251, 203, 201, 0.2);
            border: 1px dashed var(--coquette-pink);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: var(--lana-wine);
            transition: all 0.2s;
        }

        .grid-add-btn:hover {
            background: var(--coquette-pink);
            color: white;
        }

        /* Style 3: Table Routine with Icons */
        .routine-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
        }

        .routine-row {
            background: #faf8f5;
            border-radius: 15px;
            transition: all 0.2s;
        }

        .routine-row:hover {
            transform: scale(1.01);
            background: #fbf0ee;
        }

        .routine-cell {
            padding: 15px 20px;
        }

        .routine-cell:first-child {
            border-radius: 15px 0 0 15px;
            font-weight: bold;
            color: var(--lana-wine);
            width: 120px;
        }

        html[dir="rtl"] .routine-cell:first-child {
            border-radius: 0 15px 15px 0;
        }

        .routine-cell:last-child {
            border-radius: 0 15px 15px 0;
            text-align: left;
        }

        html[dir="rtl"] .routine-cell:last-child {
            border-radius: 15px 0 0 15px;
            text-align: right;
        }

        .cell-editable {
            outline: none;
        }

        /* BOARD PAGE (Corkboard) */
        .board-canvas {
            width: 100%;
            height: 750px;
            background-size: cover;
            border-radius: 32px;
            border: 16px solid #b1845f; /* Wood frame style */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        /* Draggable elements on board */
        .board-item {
            position: absolute;
            cursor: move;
            transition: box-shadow 0.2s;
            padding: 10px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
        }

        .board-item:active {
            box-shadow: 5px 10px 20px rgba(0,0,0,0.25);
        }

        /* Pin aesthetic (excluding stickers) */
        .board-item:not(.sticker)::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: radial-gradient(circle, #ff4d4d 40%, #cc0000 80%);
            border-radius: 50%;
            box-shadow: 0 4px 5px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* Polaroid layout */
        .polaroid {
            background: #fff;
            padding: 10px 10px 30px 10px;
            border-radius: 2px;
            width: 180px;
            text-align: center;
        }

        .polaroid img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border: 1px solid #f0e6df;
        }

        .polaroid-caption {
            font-family: 'Caveat', cursive;
            font-size: 18px;
            margin-top: 10px;
            color: #333;
            outline: none;
        }

        /* SHAPABLE STICKY NOTES */
        .sticky-note {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            transition: clip-path 0.3s, border-radius 0.3s;
        }

        /* Note Shapes variants */
        .shape-square {
            width: 170px;
            height: 170px;
            border-radius: 12px;
        }

        .shape-circle {
            width: 170px;
            height: 170px;
            border-radius: 50%;
        }

        .shape-heart {
            width: 170px;
            height: 170px;
            /* Precise CSS Clip path representing a sweet heart shape */
            clip-path: url(#heart-clip);
            /* Fallback shape representation */
            background-color: var(--coquette-pink);
        }

        .shape-rect {
            width: 220px;
            height: 140px;
            border-radius: 20px;
        }

        .sticky-note-text {
            outline: none;
            width: 100%;
            max-height: 100%;
            font-size: 18px;
            word-break: break-word;
        }

        /* Stickers style */
        .sticker {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            cursor: move;
            box-shadow: none !important;
        }

        /* Delete / Transform Controls overlay on hover */
        .item-control-overlay {
            position: absolute;
            top: -12px;
            right: -12px;
            display: none;
            gap: 5px;
            z-index: 100;
        }

        .board-item:hover .item-control-overlay {
            display: flex;
        }

        .btn-mini {
            background: white;
            border: 1px solid #ccc;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .btn-mini:hover {
            background: var(--coquette-pink);
            color: white;
        }

        .btn-mini.delete-btn:hover {
            background: #ff4d4d;
            color: white;
        }

        /* Cute Floating Doodles for Background Aesthetics */
        .aesthetic-doodle {
            position: absolute;
            pointer-events: none;
            opacity: 0.15;
            z-index: 0;
        }
    </style>
</head>
<body>

    <!-- SVG Definitions for custom shapes clipping paths -->
    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <clipPath id="heart-clip" clipPathUnits="objectBoundingBox">
                <path d="M 0.5,0.28 C 0.5,0.28 0.44,-0.02 0.22,0.001 C -0.005,0.02 -0.05,0.36 0.17,0.58 L 0.5,0.92 L 0.83,0.58 C 1.05,0.36 1,-0.02 0.78,0.001 C 0.56,-0.02 0.5,0.28 0.5,0.28 Z"/>
            </clipPath>
        </defs>
    </svg>

        let currentLang = 'ar'; 

        // Default layout items for initialization
        const defaultScheduleItems = [
            { time: "8:00 AM", text: "الاستيقاظ والتمارين الصباحية / Wake up & Stretch" },
            { time: "9:30 AM", text: "فطور صحي ولذيذ / Yummy Healthy Breakfast 🍓" },

            { time: "2:00 PM", text: "وقت حر للاستجمام ومشاهدة فيلم مفضل / Movie Chill time 🍿" }
        ];

        const defaultGridItems = {
            'SUN': [{ time: "09:00 AM", text: "Plan of the day" }],
            'MON': [], 'TUE': [], 'WED': [], 'THU': [], 'FRI': [], 'SAT': []
        };

        const defaultBoardItems = [
            {
                type: 'polaroid',
                imgSrc: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&q=80&w=400',
                caption: 'Keep Smiling!',
                top: 80, left: 100, rotation: -5
            },
            {
                type: 'sticky',
                bgColor: '#ffcfe3',
                text: 'ملاحظة اليوم: كوني سعيدة ومثابرة دوماً! 💕',
                shape: 'shape-square',
                fontFamily: "'Caveat', cursive",
                top: 150, left: 450, rotation: 4
            }
        ];

        // BOARD SESSION DATABASE (MULTIPLE BOARDS CO-EXISTENCE ENGINE)
        let boardsDatabase = []; 
        let activeBoardId = null;

        // Current Active Board runtime variables
        let scheduleItems = [];
        let gridWeeklyItems = {};
        let boardItems = [];
        let currentStyle = 'timeline';
        let baseFontSize = 16;
        let activeThemeColor = '#fbcbc9';
        let activeFont = "'Quicksand', 'Tajawal', sans-serif";
        let storedTimelineImgSrc = "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=400";
        let boardBackgroundUrl = "https://images.unsplash.com/photo-1587582423116-ec07293f0395?auto=format&fit=crop&q=80&w=1400";
        let headerTitle = "MY WEEKEND ROUTINE";
        let headerSub = "Relax • Recharge • Enjoy";

        // Local Storage Init & Sync Engine for Multiple Sessions
        function loadDatabase() {
            boardsDatabase = JSON.parse(localStorage.getItem('ap_sessions_db')) || [];
            activeBoardId = localStorage.getItem('ap_active_session_id');

            // If empty database, create a default startup board
            if (boardsDatabase.length === 0) {
                const defaultBoardSession = {
                    id: 'board_' + Date.now(),
                    name: 'لوحة الروتين الوردية 🌸',
                    scheduleItems: defaultScheduleItems,
                    gridWeeklyItems: defaultGridItems,
                    boardItems: defaultBoardItems,
                    currentStyle: 'timeline',
                    baseFontSize: 16,
                    activeThemeColor: '#fbcbc9',
                    activeFont: "'Quicksand', 'Tajawal', sans-serif",
                    timelineImg: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=400",
                    boardBg: "https://images.unsplash.com/photo-1587582423116-ec07293f0395?auto=format&fit=crop&q=80&w=1400",
                    headerTitle: "MY WEEKEND ROUTINE",
                    headerSub: "Relax • Recharge • Enjoy"
                };
                boardsDatabase.push(defaultBoardSession);
                activeBoardId = defaultBoardSession.id;
                localStorage.setItem('ap_sessions_db', JSON.stringify(boardsDatabase));
                localStorage.setItem('ap_active_session_id', activeBoardId);
            }

            // Sync the active board structure to the variables
            setActiveBoardSession(activeBoardId);
        }

        function setActiveBoardSession(id) {
            const session = boardsDatabase.find(b => b.id === id) || boardsDatabase[0];
            activeBoardId = session.id;
            localStorage.setItem('ap_active_session_id', activeBoardId);

            // Sync state
            scheduleItems = session.scheduleItems || [];
            gridWeeklyItems = session.gridWeeklyItems || {};
            boardItems = session.boardItems || [];
            currentStyle = session.currentStyle || 'timeline';
            baseFontSize = session.baseFontSize || 16;
            activeThemeColor = session.activeThemeColor || '#fbcbc9';
            activeFont = session.activeFont || "'Quicksand', 'Tajawal', sans-serif";
            storedTimelineImgSrc = session.timelineImg || "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=400";
            boardBackgroundUrl = session.boardBg || "https://images.unsplash.com/photo-1587582423116-ec07293f0395?auto=format&fit=crop&q=80&w=1400";
            headerTitle = session.headerTitle || "MY WEEKEND ROUTINE";
            headerSub = session.headerSub || "Relax • Recharge • Enjoy";

            // Language config loading
            currentLang = localStorage.getItem('ap_global_lang') || 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            // Sync settings inputs
            document.getElementById('fontSelect').value = activeFont;
            document.documentElement.style.setProperty('--coquette-pink', activeThemeColor);
            document.getElementById('scheduleCanvas').style.fontFamily = activeFont;
            document.getElementById('editable-title').innerText = headerTitle;
            document.getElementById('editable-subtitle').innerText = headerSub;
            document.getElementById('boardCanvas').style.backgroundImage = `url('${boardBackgroundUrl}')`;

            // Draw layouts
            renderSchedule();
            renderBoard();
            renderDrawerSessions();
        }

        function saveActiveBoardSessionToDB() {
            // Read active layout headers from screen
            headerTitle = document.getElementById('editable-title').innerText;
            headerSub = document.getElementById('editable-subtitle').innerText;

            const sessionIdx = boardsDatabase.findIndex(b => b.id === activeBoardId);
            if (sessionIdx !== -1) {
                // Compile live UI elements to boardItems list first
                compileLiveBoardElements();

                boardsDatabase[sessionIdx] = {
                    id: activeBoardId,
                    name: boardsDatabase[sessionIdx].name, // keep existing name
                    scheduleItems,
                    gridWeeklyItems,
                    boardItems,
                    currentStyle,
                    baseFontSize,
                    activeThemeColor,
                    activeFont,
                    timelineImg: storedTimelineImgSrc,
                    boardBg: boardBackgroundUrl,
                    headerTitle,
                    headerSub
                };
                localStorage.setItem('ap_sessions_db', JSON.stringify(boardsDatabase));
            }
        }

        // Compile elements visually positioned on board into data items safely
        function compileLiveBoardElements() {
            const liveItems = [];
            document.querySelectorAll('#boardCanvas .board-item').forEach(el => {
                const rotation = getRotationAngle(el);
                const top = parseInt(el.style.top) || 100;
                const left = parseInt(el.style.left) || 100;
                
                if (el.querySelector('.polaroid')) {
                    liveItems.push({
                        type: 'polaroid',
                        imgSrc: el.querySelector('.polaroid img').src,
                        caption: el.querySelector('.polaroid-caption').innerText,
                        top, left, rotation
                    });
                } else if (el.querySelector('.sticky-note')) {
                    const stickyEl = el.querySelector('.sticky-note');
                    // parse current shape class list
                    let matchedShape = 'shape-square';
                    ['shape-square', 'shape-rect', 'shape-circle', 'shape-heart'].forEach(s => {
                        if (stickyEl.classList.contains(s)) matchedShape = s;
                    });
                    
                    liveItems.push({
                        type: 'sticky',
                        bgColor: stickyEl.style.backgroundColor,
                        text: el.querySelector('.sticky-note-text').innerText,
                        shape: matchedShape,
                        fontFamily: stickyEl.style.fontFamily,
                        top, left, rotation
                    });
                } else if (el.classList.contains('sticker')) {
                    const clone = el.cloneNode(true);
                    const overlay = clone.querySelector('.item-control-overlay');
                    if (overlay) overlay.remove();
                    const emoji = clone.innerText.trim();
                    liveItems.push({
                        type: 'sticker',
                        emoji,
                        top, left, rotation
                    });
                }
            });
            boardItems = liveItems;
        }

        function createNewBoardSession() {
            const trans = i18n[currentLang];
            const nameInput = prompt(currentLang === 'ar' ? 'ادخل اسم اللوحة الجديدة:' : 'Enter name for new board:', trans.defaultBoardName);
            if (nameInput === null) return; // cancelled

            const finalName = nameInput.trim() || trans.defaultBoardName;
            const newSession = {
                id: 'board_' + Date.now(),
                name: finalName,
                scheduleItems: [
                    { time: "12:00 PM", text: trans.placeholderText }
                ],
                gridWeeklyItems: {
                    'SUN': [], 'MON': [], 'TUE': [], 'WED': [], 'THU': [], 'FRI': [], 'SAT': []
                },
                boardItems: [],
                currentStyle: 'timeline',
                baseFontSize: 16,
                activeThemeColor: '#fbcbc9',
                activeFont: "'Quicksand', 'Tajawal', sans-serif",
                timelineImg: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=400",
                boardBg: "https://images.unsplash.com/photo-1587582423116-ec07293f0395?auto=format&fit=crop&q=80&w=1400",
                headerTitle: finalName,
                headerSub: trans.defaultSubtitle
            };

            boardsDatabase.push(newSession);
            localStorage.setItem('ap_sessions_db', JSON.stringify(boardsDatabase));
            
            // Switch to it
            setActiveBoardSession(newSession.id);
            toggleDrawer(false);
        }

        function deleteBoardSession(id, event) {
            event.stopPropagation(); // don't open the board while deleting
            if (boardsDatabase.length <= 1) {
                alert(currentLang === 'ar' ? 'لا يمكن حذف اللوحة الأخيرة المتبقية!' : 'Cannot delete the only remaining board!');
                return;
            }

            const confirmDel = confirm(currentLang === 'ar' ? 'هل أنتِ متأكدة من حذف هذه اللوحة وكل محتوياتها نهائياً؟' : 'Are you sure you want to delete this board?');
            if (confirmDel) {
                boardsDatabase = boardsDatabase.filter(b => b.id !== id);
                localStorage.setItem('ap_sessions_db', JSON.stringify(boardsDatabase));
                
                // If we deleted the active one, fallback to first board in db list
                if (activeBoardId === id) {
                    activeBoardId = boardsDatabase[0].id;
                }
                setActiveBoardSession(activeBoardId);
            }
        }

        // Drawer Sliding & Opening Control
        function toggleDrawer(isOpen) {
            const drawer = document.getElementById('drawerOverlay');
            if (isOpen) {
                drawer.classList.add('open');
                renderDrawerSessions();
            } else {
                drawer.classList.remove('open');
            }
        }

        function renderDrawerSessions() {
            const list = document.getElementById('boardsListContainer');
            list.innerHTML = '';

            boardsDatabase.forEach(board => {
                const isActive = board.id === activeBoardId;
                const item = document.createElement('div');
                item.className = `board-list-item ${isActive ? 'active' : ''}`;
                item.onclick = () => {
                    saveActiveBoardSessionToDB(); // auto-save current state before leaving
                    setActiveBoardSession(board.id);
                    toggleDrawer(false);
                };

                item.innerHTML = `
                    <div class="board-name-text">📋 ${board.name}</div>
                    <button class="board-item-delete" onclick="deleteBoardSession('${board.id}', event)">🗑️</button>
                `;
                list.appendChild(item);
            });
        }

        // Color label visual updating
        function updateSelectedColorLabel(val) {
            document.getElementById('colorHexLabel').innerText = val;
        }

        // Tab Switching
        function switchTab(pageId, event) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Language toggle
        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            localStorage.setItem('ap_global_lang', currentLang);
            applyTranslations();
            renderSchedule();
            renderDrawerSessions();
        }

        function applyTranslations() {
            const trans = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (trans[key]) el.innerText = trans[key];
            });

            document.getElementById('btn-layout-timeline').innerText = trans.btnLayoutTimeline;
            document.getElementById('btn-layout-grid').innerText = trans.btnLayoutGrid;
            document.getElementById('btn-layout-table').innerText = trans.btnLayoutTable;
        }

        // --- SCHEDULE CORE CONTROLS ---
        function setScheduleStyle(styleName) {
            currentStyle = styleName;
            document.querySelectorAll('.layout-btn').forEach(btn => btn.classList.remove('active'));
            
            if (styleName === 'timeline') document.getElementById('btn-layout-timeline').classList.add('active');
            if (styleName === 'grid') document.getElementById('btn-layout-grid').classList.add('active');
            if (styleName === 'table') document.getElementById('btn-layout-table').classList.add('active');
            
            saveActiveBoardSessionToDB();
            renderSchedule();
        }

        function changeScheduleFont(fontFamily) {
            activeFont = fontFamily;
            document.getElementById('scheduleCanvas').style.fontFamily = fontFamily;
            saveActiveBoardSessionToDB();
        }

        function adjustFontSize(dir) {
            baseFontSize += dir;
            document.getElementById('layoutRenderArea').style.fontSize = baseFontSize + 'px';
            saveActiveBoardSessionToDB();
        }

        function setThemeColor(color) {
            activeThemeColor = color;
            document.documentElement.style.setProperty('--coquette-pink', color);
            saveActiveBoardSessionToDB();
            renderSchedule();
        }

        function addNewScheduleItem() {
            const labelText = i18n[currentLang].placeholderText;
            if (currentStyle === 'grid') {
                gridWeeklyItems['SUN'].push({ time: "12:00 PM", text: labelText });
            } else {
                scheduleItems.push({ time: "12:00 PM", text: labelText });
            }
            saveActiveBoardSessionToDB();
            renderSchedule();
        }

        function removeScheduleItem(index) {
            scheduleItems.splice(index, 1);
            saveActiveBoardSessionToDB();
            renderSchedule();
        }

        function updateItemText(index, text) {
            scheduleItems[index].text = text;
            saveActiveBoardSessionToDB();
        }

        function updateItemTime(index, time) {
            scheduleItems[index].time = time;
            saveActiveBoardSessionToDB();
        }

        // Grid Actions
        function addGridItem(dayKey) {
            const labelText = i18n[currentLang].placeholderText;
            gridWeeklyItems[dayKey].push({ time: "12:00 PM", text: labelText });
            saveActiveBoardSessionToDB();
            renderSchedule();
        }

        function removeGridItem(dayKey, index) {
            gridWeeklyItems[dayKey].splice(index, 1);
            saveActiveBoardSessionToDB();
            renderSchedule();
        }

        function updateGridTime(dayKey, index, time) {
            gridWeeklyItems[dayKey][index].time = time;
            saveActiveBoardSessionToDB();
        }

        function updateGridText(dayKey, index, text) {
            gridWeeklyItems[dayKey][index].text = text;
            saveActiveBoardSessionToDB();
        }

        function saveHeaderContent() {
            headerTitle = document.getElementById('editable-title').innerText;
            headerSub = document.getElementById('editable-subtitle').innerText;
            saveActiveBoardSessionToDB();
        }

        function renderSchedule() {
            const renderArea = document.getElementById('layoutRenderArea');
            renderArea.style.fontSize = baseFontSize + 'px';
            renderArea.innerHTML = '';

            if (currentStyle === 'timeline') {
                let timelineHTML = `<div class="timeline-container">
                    <div class="timeline-items">`;
                
                scheduleItems.forEach((item, index) => {
                    timelineHTML += `
                        <div class="timeline-item">
                            <div class="item-time" contenteditable="true" onblur="updateItemTime(${index}, this.innerText)">${item.time}</div>
                            <div class="item-separator">--</div>
                            <div class="item-text" contenteditable="true" onblur="updateItemText(${index}, this.innerText)">${item.text}</div>
                            <div class="item-actions">
                                <button class="action-btn" onclick="removeScheduleItem(${index})">🗑️</button>
                            </div>
                        </div>
                    `;
                });
                
                timelineHTML += `</div>
                    <div class="timeline-sidebar">
                        <div class="aesthetic-frame" onclick="document.getElementById('timelineFrameUpload').click()">
                            <img id="timelineFrameImg" src="${storedTimelineImgSrc}" alt="Inspiration">
                            <input type="file" id="timelineFrameUpload" accept="image/*" onchange="uploadTimelineImage(event)">
                        </div>
                    </div>
                </div>`;
                renderArea.innerHTML = timelineHTML;

            } else if (currentStyle === 'grid') {
                const rawDays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
                const i18nDays = i18n[currentLang].weekDays;
                let gridHTML = `<div class="calendar-grid">`;
                
                rawDays.forEach((day, index) => {
                    gridHTML += `<div>
                        <div class="grid-header-day">${i18nDays[index]}</div>
                        <div class="grid-col">`;
                    
                    const items = gridWeeklyItems[day] || [];
                    items.forEach((item, idx) => {
                        gridHTML += `
                            <div class="grid-card">
                                <div class="grid-card-actions">
                                    <button class="action-btn" style="width:18px; height:18px; font-size:9px;" onclick="removeGridItem('${day}', ${idx})">❌</button>
                                </div>
                                <div class="grid-card-time" contenteditable="true" onblur="updateGridTime('${day}', ${idx}, this.innerText)">${item.time}</div>
                                <div class="grid-card-text" contenteditable="true" onblur="updateGridText('${day}', ${idx}, this.innerText)">${item.text}</div>
                            </div>
                        `;
                    });

                    gridHTML += `<div class="grid-add-btn" onclick="addGridItem('${day}')">➕ Add</div>`;
                    gridHTML += `</div></div>`;
                });
                gridHTML += `</div>`;
                renderArea.innerHTML = gridHTML;

            } else if (currentStyle === 'table') {
                let tableHTML = `<table class="routine-table">`;
                scheduleItems.forEach((item, index) => {
                    tableHTML += `
                        <tr class="routine-row">
                            <td class="routine-cell cell-editable" contenteditable="true" onblur="updateItemTime(${index}, this.innerText)">${item.time}</td>
                            <td class="routine-cell cell-editable" contenteditable="true" onblur="updateItemText(${index}, this.innerText)">${item.text}</td>
                            <td class="routine-cell" style="width: 50px;">
                                <button class="action-btn" onclick="removeScheduleItem(${index})">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
                tableHTML += `</table>`;
                renderArea.innerHTML = tableHTML;
            }
        }

        function uploadTimelineImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('timelineFrameImg').src = e.target.result;
                    storedTimelineImgSrc = e.target.result;
                    saveActiveBoardSessionToDB();
                }
                reader.readAsDataURL(file);
            }
        }

        function exportScheduleImage() {
            const canvas = document.getElementById('scheduleCanvas');
            html2canvas(canvas, { scale: 2 }).then(canvasImage => {
                const link = document.createElement('a');
                link.download = 'my-aesthetic-schedule.png';
                link.href = canvasImage.toDataURL();
                link.click();
            });
        }


        // --- CORKBOARD CORE & INTERACTIVITY ENGINE ---
        let draggedElement = null;
        let offsetX = 0;
        let offsetY = 0;

        function dragStart(e) {
            // Prevent dragging if editing text
            if (e.target.hasAttribute('contenteditable')) return;

            draggedElement = e.currentTarget;
            
            const allItems = document.querySelectorAll('.board-item');
            allItems.forEach(item => item.style.zIndex = 1);
            draggedElement.style.zIndex = 10;

            const rect = draggedElement.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', dragEnd);
        }

        function dragMove(e) {
            if (!draggedElement) return;
            const canvas = document.getElementById('boardCanvas');
            const canvasRect = canvas.getBoundingClientRect();
            
            let x = e.clientX - canvasRect.left - offsetX;
            let y = e.clientY - canvasRect.top - offsetY;

            x = Math.max(0, Math.min(x, canvasRect.width - draggedElement.offsetWidth));
            y = Math.max(0, Math.min(y, canvasRect.height - draggedElement.offsetHeight));

            draggedElement.style.left = x + 'px';
            draggedElement.style.top = y + 'px';
        }

        function dragEnd() {
            draggedElement = null;
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('mouseup', dragEnd);
            saveActiveBoardSessionToDB(); // Autosave positions on mouse up
        }

        function renderBoard() {
            const board = document.getElementById('boardCanvas');
            board.innerHTML = '';

            boardItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'board-item';
                card.style.top = item.top + 'px';
                card.style.left = item.left + 'px';
                card.style.transform = `rotate(${item.rotation || 0}deg)`;
                card.onmousedown = dragStart;

                if (item.type === 'polaroid') {
                    card.innerHTML = `
                        <div class="item-control-overlay">
                            <button class="btn-mini" onclick="rotateItem(this.parentNode.parentNode, 15)">🔄</button>
                            <button class="btn-mini delete-btn" onclick="removeBoardItem(this.parentNode.parentNode)">❌</button>
                        </div>
                        <div class="polaroid">
                            <img src="${item.imgSrc}" alt="Board memory">
                            <div class="polaroid-caption" contenteditable="true" onblur="saveActiveBoardSessionToDB()">${item.caption}</div>
                        </div>
                    `;
                } else if (item.type === 'sticky') {
                    const chosenShape = item.shape || 'shape-square';
                    const chosenFont = item.fontFamily || "'Caveat', cursive";
                    
                    card.innerHTML = `
                        <div class="item-control-overlay">
                            <button class="btn-mini" onclick="rotateItem(this.parentNode.parentNode, 15)">🔄</button>
                            <button class="btn-mini delete-btn" onclick="removeBoardItem(this.parentNode.parentNode)">❌</button>
                        </div>
                        <div class="sticky-note ${chosenShape}" style="background-color: ${item.bgColor}; font-family: ${chosenFont};">
                            <div class="sticky-note-text" contenteditable="true" onblur="saveActiveBoardSessionToDB()">${item.text}</div>
                        </div>
                    `;
                } else if (item.type === 'sticker') {
                    card.className = 'board-item sticker';
                    card.innerHTML = `
                        <div class="item-control-overlay">
                            <button class="btn-mini" onclick="rotateItem(this.parentNode.parentNode, 15)">🔄</button>
                            <button class="btn-mini delete-btn" onclick="removeBoardItem(this.parentNode.parentNode)">❌</button>
                        </div>
                        ${item.emoji}
                    `;
                }
                board.appendChild(card);
            });
        }

        function removeBoardItem(itemEl) {
            itemEl.remove();
            saveActiveBoardSessionToDB();
        }

        // Add note using customized Color Picker & Custom Shapes
        function addCustomStickyNote() {
            const trans = i18n[currentLang];
            const customColor = document.getElementById('stickyColorPicker').value;
            const chosenShape = document.getElementById('stickyShapeSelect').value;
            const chosenFont = document.getElementById('stickyFontSelect').value;

            boardItems.push({
                type: 'sticky',
                bgColor: customColor,
                text: trans.writeHere,
                shape: chosenShape,
                fontFamily: chosenFont,
                top: 150, left: 150, rotation: Math.random() * 10 - 5
            });
            saveActiveBoardSessionToDB();
            renderBoard();
        }

        function addSticker(emoji) {
            boardItems.push({
                type: 'sticker',
                emoji: emoji,
                top: 100, left: 300, rotation: Math.random() * 20 - 10
            });
            saveActiveBoardSessionToDB();
            renderBoard();
        }

        function uploadBoardImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const trans = i18n[currentLang];
                    boardItems.push({
                        type: 'polaroid',
                        imgSrc: e.target.result,
                        caption: trans.sweetMemory,
                        top: 200, left: 200, rotation: Math.random() * 12 - 6
                    });
                    saveActiveBoardSessionToDB();
                    renderBoard();
                }
                reader.readAsDataURL(file);
            }
        }

        function uploadBoardBackground(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('boardCanvas').style.backgroundImage = `url('${e.target.result}')`;
                    boardBackgroundUrl = e.target.result;
                    saveActiveBoardSessionToDB();
                }
                reader.readAsDataURL(file);
            }
        }

        function rotateItem(itemEl, amount) {
            const currentAngle = getRotationAngle(itemEl);
            const newAngle = currentAngle + amount;
            itemEl.style.transform = `rotate(${newAngle}deg)`;
            saveActiveBoardSessionToDB();
        }

        function getRotationAngle(el) {
            const style = window.getComputedStyle(el);
            const matrix = style.transform || style.webkitTransform || style.mozTransform;
            if (matrix && matrix !== 'none') {
                const values = matrix.split('(')[1].split(')')[0].split(',');
                const a = values[0];
                const b = values[1];
                return Math.round(Math.atan2(b, a) * (180/Math.PI));
            }
            return 0;
        }

        function clearBoard() {
            if (confirm(i18n[currentLang].confirmClear)) {
                document.getElementById('boardCanvas').innerHTML = '';
                boardItems = [];
                saveActiveBoardSessionToDB();
            }
        }

        // Initialize App on window load
        window.onload = () => {
            loadDatabase();
            applyTranslations();
        }
    </script>
</body>
</html>
