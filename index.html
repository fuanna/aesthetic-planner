<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Schedule & Corkboard Planner</title>
    <!-- Google Fonts for exquisite English & Arabic typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Cairo:wght@300;400;600;700&family=Montserrat:ital,wght@0,300;0,500;0,700;1,300&family=Quicksand:wght@300;500;700&family=Tajawal:wght@300;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #faf5ef;
            --coquette-pink: #fbcbc9;
            --pastel-blue: #cbdadb;
            --lana-wine: #72251f;
            --lana-blue: #8090a8;
            --shadow-sm: 0 4px 10px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 20px rgba(0,0,0,0.1);
            --font-primary: 'Quicksand', 'Tajawal', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-cream);
            font-family: var(--font-primary);
            color: #3e3835;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Nav Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(224, 209, 194, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', 'Amiri', serif;
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            color: var(--lana-wine);
            text-decoration: none;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-tabs {
            display: flex;
            gap: 15px;
        }

        .tab-btn {
            background: none;
            border: 2px solid transparent;
            padding: 10px 24px;
            font-size: 16px;
            font-family: var(--font-primary);
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            color: #726259;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: rgba(251, 203, 201, 0.3);
            color: var(--lana-wine);
        }

        .tab-btn.active {
            background: var(--coquette-pink);
            color: #fff;
            box-shadow: var(--shadow-sm);
        }

        /* App Containers */
        .page-container {
            display: none;
            padding: 30px 40px;
            animation: fadeIn 0.5s ease;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar Control Center */
        .app-layout {
            display: flex;
            gap: 30px;
            flex-direction: row-reverse; /* For RTL layout compatibility */
        }

        @media (max-width: 1024px) {
            .app-layout {
                flex-direction: column-reverse;
            }
        }

        .control-panel {
            flex: 0 0 320px;
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(224, 209, 194, 0.4);
            height: fit-content;
        }

        .main-workspace {
            flex: 1;
        }

        /* Form elements */
        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--lana-wine);
            border-bottom: 2px dashed var(--coquette-pink);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #726259;
        }

        .control-btn {
            width: 100%;
            background: #faf6f5;
            border: 1px solid #e0d1c2;
            padding: 12px;
            border-radius: 12px;
            font-family: var(--font-primary);
            font-size: 14px;
            color: #5c4e46;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .control-btn:hover {
            background: var(--coquette-pink);
            color: white;
            border-color: var(--coquette-pink);
        }

        .control-btn.accent {
            background: var(--lana-wine);
            color: #fff;
            border-color: var(--lana-wine);
        }

        .control-btn.accent:hover {
            opacity: 0.9;
        }

        select, input[type="text"], input[type="time"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e0d1c2;
            font-family: var(--font-primary);
            font-size: 14px;
            color: #5c4e46;
            background: #fafcfc;
            outline: none;
            transition: border 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--coquette-pink);
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .color-swatch {
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: #5c4e46;
        }

        /* SCHEDULE PAGES LAYOUTS */
        .layout-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .layout-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e0d1c2;
            background: white;
            cursor: pointer;
            font-family: var(--font-primary);
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .layout-btn.active {
            background: var(--coquette-pink);
            color: white;
            border-color: var(--coquette-pink);
        }

        /* Renderable Canvas for Schedule */
        .schedule-canvas {
            background: #fff;
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(224, 209, 194, 0.4);
            min-height: 700px;
            position: relative;
            overflow: hidden;
        }

        /* Customizable Schedule Styles */
        .schedule-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .schedule-title {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 36px;
            font-weight: bold;
            color: var(--lana-wine);
            outline: none;
            display: inline-block;
            border-bottom: 2px dashed transparent;
        }

        .schedule-title:focus {
            border-bottom-color: var(--coquette-pink);
        }

        .schedule-subtitle {
            font-family: 'Caveat', 'Tajawal', cursive;
            font-size: 22px;
            color: #8c7b72;
            margin-top: 5px;
            outline: none;
            display: inline-block;
        }

        /* Style 1: Timeline Layout (Wonyoungism style) */
        .timeline-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .timeline-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px;
            border-radius: 12px;
            transition: background 0.2s;
            position: relative;
        }

        .timeline-item:hover {
            background: #faf6f5;
        }

        .item-actions {
            position: absolute;
            left: 10px;
            display: none;
            gap: 5px;
        }

        .timeline-item:hover .item-actions {
            display: flex;
        }

        .action-btn {
            background: white;
            border: 1px solid #e0d1c2;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .action-btn:hover {
            background: var(--coquette-pink);
            color: white;
        }

        .item-time {
            font-weight: 700;
            color: var(--lana-wine);
            min-width: 100px;
            outline: none;
        }

        .item-separator {
            color: var(--coquette-pink);
            font-weight: bold;
        }

        .item-text {
            outline: none;
            flex: 1;
            font-size: 16px;
        }

        /* Cute Profile/Side Image for Timeline */
        .timeline-sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .aesthetic-frame {
            width: 100%;
            height: 320px;
            border-radius: 20px;
            overflow: hidden;
            border: 8px solid #fff;
            box-shadow: var(--shadow-sm);
            position: relative;
            cursor: pointer;
            background: #f5ece6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .aesthetic-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .aesthetic-frame input[type="file"] {
            display: none;
        }

        /* Style 2: Grid/Weekly Calendar (Lana honeymoon style) */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .grid-header-day {
            text-align: center;
            font-weight: 700;
            padding: 10px;
            background: var(--coquette-pink);
            color: white;
            border-radius: 12px;
            font-size: 14px;
        }

        .grid-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 400px;
            background: #faf9f6;
            padding: 8px;
            border-radius: 12px;
            border: 1px dashed #e0d1c2;
        }

        .grid-card {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
            border-left: 4px solid var(--coquette-pink);
        }

        .grid-card:hover {
            transform: translateY(-2px);
        }

        .grid-card-time {
            font-size: 11px;
            font-weight: bold;
            color: #8c7b72;
            margin-bottom: 5px;
        }

        .grid-card-text {
            font-size: 13px;
            outline: none;
        }

        /* Style 3: Table Routine with Icons & Washi Tape polaroids */
        .routine-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
        }

        .routine-row {
            background: #faf8f5;
            border-radius: 15px;
            transition: all 0.2s;
        }

        .routine-row:hover {
            transform: scale(1.01);
            background: #fbf0ee;
        }

        .routine-cell {
            padding: 15px 20px;
        }

        .routine-cell:first-child {
            border-radius: 15px 0 0 15px;
            font-weight: bold;
            color: var(--lana-wine);
            width: 120px;
        }

        .routine-cell:last-child {
            border-radius: 0 15px 15px 0;
            text-align: left;
        }

        .cell-editable {
            outline: none;
        }

        /* BOARD PAGE (Corkboard) */
        .board-canvas {
            width: 100%;
            height: 750px;
            background-image: url('https://images.unsplash.com/photo-1587582423116-ec07293f0395?auto=format&fit=crop&q=80&w=1400'); /* Cork texture */
            background-size: cover;
            border-radius: 32px;
            border: 16px solid #b1845f; /* Wood frame style */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        /* Draggable elements on board */
        .board-item {
            position: absolute;
            cursor: move;
            transition: box-shadow 0.2s;
            padding: 15px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
        }

        .board-item:active {
            box-shadow: 5px 10px 20px rgba(0,0,0,0.25);
        }

        /* Pin aesthetic */
        .board-item::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #ff4d4d 40%, #cc0000 80%);
            border-radius: 50%;
            box-shadow: 0 4px 5px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* Polaroid layout */
        .polaroid {
            background: #fff;
            padding: 12px 12px 35px 12px;
            border-radius: 2px;
            width: 180px;
            text-align: center;
        }

        .polaroid img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border: 1px solid #f0e6df;
        }

        .polaroid-caption {
            font-family: 'Caveat', cursive;
            font-size: 18px;
            margin-top: 10px;
            color: #333;
            outline: none;
        }

        /* Sticky Notes style */
        .sticky-note {
            width: 170px;
            height: 170px;
            background: #fff5bc;
            padding: 15px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
            font-family: 'Caveat', 'Cairo', cursive;
            font-size: 18px;
            color: #3e3835;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .sticky-note-text {
            outline: none;
            width: 100%;
            max-height: 100%;
        }

        /* Stickers style */
        .sticker {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            cursor: move;
            box-shadow: none !important;
        }
        .sticker::before {
            display: none !important; /* No pins for stickers */
        }

        /* Delete / Transform Controls overlay on hover */
        .item-control-overlay {
            position: absolute;
            top: -12px;
            right: -12px;
            display: none;
            gap: 5px;
            z-index: 100;
        }

        .board-item:hover .item-control-overlay {
            display: flex;
        }

        .btn-mini {
            background: white;
            border: 1px solid #ccc;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-mini:hover {
            background: #ff4d4d;
            color: white;
        }

        /* Cute Floating Doodles for Background Aesthetics */
        .aesthetic-doodle {
            position: absolute;
            pointer-events: none;
            opacity: 0.15;
            z-index: 0;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <a href="#" class="logo">🌸 Aesthetic Planner</a>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('schedule-page')">📅 الجدول الزمني (Schedule)</button>
            <button class="tab-btn" onclick="switchTab('board-page')">📌 البورد الفني (Board)</button>
        </div>
    </header>

    <!-- 1. SCHEDULE PAGE CONTAINER -->
    <div id="schedule-page" class="page-container active">
        <div class="app-layout">
            
            <!-- Sidebar Controls for Schedule -->
            <div class="control-panel">
                <h3 class="panel-title">✨ خيارات الجدول</h3>
                
                <div class="control-group">
                    <label>نمط التخطيط Layout</label>
                    <div class="layout-selector">
                        <button class="layout-btn active" onclick="setScheduleStyle('timeline')">مخطط زمني</button>
                        <button class="layout-btn" onclick="setScheduleStyle('grid')">جدول أسبوعي</button>
                        <button class="layout-btn" onclick="setScheduleStyle('table')">روتين الويكند</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>الخط المستخدم Font</label>
                    <select id="fontSelect" onchange="changeScheduleFont(this.value)">
                        <option value="'Quicksand', 'Tajawal', sans-serif">عصري مبسط (Tajawal)</option>
                        <option value="'Cairo', sans-serif">ريادي مميز (Cairo)</option>
                        <option value="'Amiri', serif">كلاسيكي دافئ (Amiri)</option>
                        <option value="'Playfair Display', serif">أنيق فاخر (Playfair)</option>
                        <option value="'Caveat', cursive">يدوي لطيف (Caveat)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>حجم الخط Font Size</label>
                    <div style="display:flex; gap:10px;">
                        <button class="control-btn" onclick="adjustFontSize(1)">تكبير ➕</button>
                        <button class="control-btn" onclick="adjustFontSize(-1)">تصغير ➖</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>باليت الألوان Color Palette</label>
                    <div class="color-palette">
                        <div class="color-swatch" style="background:#fbcbc9;" onclick="setThemeColor('#fbcbc9')"></div>
                        <div class="color-swatch" style="background:#8090a8;" onclick="setThemeColor('#8090a8')"></div>
                        <div class="color-swatch" style="background:#72251f;" onclick="setThemeColor('#72251f')"></div>
                        <div class="color-swatch" style="background:#cbdadb;" onclick="setThemeColor('#cbdadb')"></div>
                        <div class="color-swatch" style="background:#e0d1c2;" onclick="setThemeColor('#e0d1c2')"></div>
                    </div>
                </div>

                <button class="control-btn accent" onclick="addNewScheduleItem()">➕ إضافة عنصر جديد</button>
                <button class="control-btn" onclick="exportScheduleImage()">📸 تصدير كصورة</button>
            </div>

            <!-- Workspace / Interactive Canvas -->
            <div class="main-workspace">
                <div class="schedule-canvas" id="scheduleCanvas">
                    <!-- Heart Aesthetic Doodles -->
                    <div class="aesthetic-doodle" style="top:5%; left:10%; font-size:30px;">🤍</div>
                    <div class="aesthetic-doodle" style="top:40%; left:85%; font-size:24px;">🎀</div>
                    <div class="aesthetic-doodle" style="top:75%; left:15%; font-size:35px;">🤍</div>

                    <div class="schedule-header">
                        <div class="schedule-title" contenteditable="true">MY WEEKEND ROUTINE</div>
                        <br>
                        <div class="schedule-subtitle" contenteditable="true">Relax • Recharge • Enjoy</div>
                    </div>

                    <!-- Layout rendering area -->
                    <div id="layoutRenderArea">
                        <!-- Content dynamically loaded here -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 2. BOARD PAGE CONTAINER (Corkboard) -->
    <div id="board-page" class="page-container">
        <div class="app-layout">
            
            <!-- Sidebar Controls for Corkboard -->
            <div class="control-panel">
                <h3 class="panel-title">📌 أدوات اللوحة</h3>
                
                <div class="control-group">
                    <label>إضافة ملاحظة ملونة</label>
                    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; margin-bottom:10px;">
                        <button class="control-btn" style="background:#fff5bc;" onclick="addStickyNote('#fff5bc')">💛</button>
                        <button class="control-btn" style="background:#ffcfe3;" onclick="addStickyNote('#ffcfe3')">🌸</button>
                        <button class="control-btn" style="background:#d0f4de;" onclick="addStickyNote('#d0f4de')">🟢</button>
                        <button class="control-btn" style="background:#a9def9;" onclick="addStickyNote('#a9def9')">🔵</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>رفع صورة بولارويد</label>
                    <button class="control-btn accent" onclick="document.getElementById('boardImageUpload').click()">📷 رفع صورة للوحة</button>
                    <input type="file" id="boardImageUpload" accept="image/*" style="display:none;" onchange="uploadBoardImage(event)">
                </div>

                <div class="control-group">
                    <label>إضافة ملصقات لطيفة (Stickers)</label>
                    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;">
                        <button class="control-btn" style="font-size:20px; padding:5px;" onclick="addSticker('🌸')">🌸</button>
                        <button class="control-btn" style="font-size:20px; padding:5px;" onclick="addSticker('🎀')">🎀</button>
                        <button class="control-btn" style="font-size:20px; padding:5px;" onclick="addSticker('🧸')">🧸</button>
                        <button class="control-btn" style="font-size:20px; padding:5px;" onclick="addSticker('🐱')">🐱</button>
                        <button class="control-btn" style="font-size:20px; padding:5px;" onclick="addSticker('🍓')">🍓</button>
                        <button class="control-btn" style="font-size:20px; padding:5px;" onclick="addSticker('☁️')">☁️</button>
                        <button class="control-btn" style="font-size:20px; padding:5px;" onclick="addSticker('✨')">✨</button>
                        <button class="control-btn" style="font-size:20px; padding:5px;" onclick="addSticker('🎟️')">🎟️</button>
                    </div>
                </div>

                <button class="control-btn" onclick="clearBoard()">🧹 تنظيف اللوحة</button>
            </div>

            <!-- Workspace: Interactive Corkboard Canvas -->
            <div class="main-workspace">
                <div class="board-canvas" id="boardCanvas">
                    <!-- Default elements on board for inspiration -->
                    <div class="board-item" style="top: 80px; left: 100px; transform: rotate(-5deg);" onmousedown="dragStart(event)">
                        <div class="item-control-overlay">
                            <button class="btn-mini" onclick="rotateItem(this.parentNode.parentNode, -15)">🔄</button>
                            <button class="btn-mini" onclick="this.parentNode.parentNode.remove()">❌</button>
                        </div>
                        <div class="polaroid">
                            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&q=80&w=400" alt="Joyful">
                            <div class="polaroid-caption" contenteditable="true">Keep Smiling!</div>
                        </div>
                    </div>

                    <div class="board-item" style="top: 150px; left: 450px; transform: rotate(4deg);" onmousedown="dragStart(event)">
                        <div class="item-control-overlay">
                            <button class="btn-mini" onclick="rotateItem(this.parentNode.parentNode, 15)">🔄</button>
                            <button class="btn-mini" onclick="this.parentNode.parentNode.remove()">❌</button>
                        </div>
                        <div class="sticky-note" style="background-color: #ffcfe3;">
                            <div class="sticky-note-text" contenteditable="true">ملاحظة اليوم: كوني سعيدة ومثابرة دوماً! 💕</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- html2canvas Library for Export feature -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        // Data Store
        let scheduleItems = [
            { time: "8:00 AM", text: "الاستيقاظ والتمارين الصباحية / Wake up & Stretch" },
            { time: "9:30 AM", text: "فطور صحي ولذيذ / Yummy Healthy Breakfast 🍓" },
            { time: "11:00 AM", text: "قراءة كتاب وتطوير الذات / Study or reading time" },
            { time: "2:00 PM", text: "وقت حر للاستجمام ومشاهدة فيلم مفضل / Movie Chill time 🍿" }
        ];

        let currentStyle = 'timeline';
        let baseFontSize = 16;
        let activeThemeColor = '#fbcbc9';

        // Tab Switching
        function switchTab(pageId) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            event.target.classList.add('active');
        }

        // --- SCHEDULE CORE ---
        function setScheduleStyle(styleName) {
            currentStyle = styleName;
            document.querySelectorAll('.layout-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderSchedule();
        }

        function changeScheduleFont(fontFamily) {
            document.getElementById('scheduleCanvas').style.fontFamily = fontFamily;
        }

        function adjustFontSize(dir) {
            baseFontSize += dir;
            document.getElementById('layoutRenderArea').style.fontSize = baseFontSize + 'px';
        }

        function setThemeColor(color) {
            activeThemeColor = color;
            document.documentElement.style.setProperty('--coquette-pink', color);
            renderSchedule();
        }

        function addNewScheduleItem() {
            scheduleItems.push({ time: "12:00 PM", text: "مهمة جديدة / New Task" });
            renderSchedule();
        }

        function removeScheduleItem(index) {
            scheduleItems.splice(index, 1);
            renderSchedule();
        }

        function updateItemText(index, text) {
            scheduleItems[index].text = text;
        }

        function updateItemTime(index, time) {
            scheduleItems[index].time = time;
        }

        function renderSchedule() {
            const renderArea = document.getElementById('layoutRenderArea');
            renderArea.style.fontSize = baseFontSize + 'px';
            renderArea.innerHTML = '';

            if (currentStyle === 'timeline') {
                // Style 1 Render
                let timelineHTML = `<div class="timeline-container">
                    <div class="timeline-items">`;
                
                scheduleItems.forEach((item, index) => {
                    timelineHTML += `
                        <div class="timeline-item">
                            <div class="item-time" contenteditable="true" onblur="updateItemTime(${index}, this.innerText)">${item.time}</div>
                            <div class="item-separator">--</div>
                            <div class="item-text" contenteditable="true" onblur="updateItemText(${index}, this.innerText)">${item.text}</div>
                            <div class="item-actions">
                                <button class="action-btn" onclick="removeScheduleItem(${index})">🗑️</button>
                            </div>
                        </div>
                    `;
                });
                
                timelineHTML += `</div>
                    <div class="timeline-sidebar">
                        <div class="aesthetic-frame" onclick="document.getElementById('timelineFrameUpload').click()">
                            <img id="timelineFrameImg" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=400" alt="Inspiration">
                            <input type="file" id="timelineFrameUpload" accept="image/*" onchange="uploadTimelineImage(event)">
                        </div>
                        <span style="font-family:'Caveat', cursive; font-size:18px; color:#8c7b72;">✨ My Moodboard</span>
                    </div>
                </div>`;
                renderArea.innerHTML = timelineHTML;

            } else if (currentStyle === 'grid') {
                // Style 2 Render
                const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
                let gridHTML = `<div class="calendar-grid">`;
                
                days.forEach(day => {
                    gridHTML += `<div>
                        <div class="grid-header-day">${day}</div>
                        <div class="grid-col">`;
                    
                    scheduleItems.forEach((item, idx) => {
                        if (Math.random() > 0.4) { // Populate randomly for demo
                            gridHTML += `
                                <div class="grid-card">
                                    <div class="grid-card-time">${item.time}</div>
                                    <div class="grid-card-text" contenteditable="true">${item.text.split('/')[0]}</div>
                                </div>
                            `;
                        }
                    });

                    gridHTML += `</div></div>`;
                });
                gridHTML += `</div>`;
                renderArea.innerHTML = gridHTML;

            } else if (currentStyle === 'table') {
                // Style 3 Render
                let tableHTML = `<table class="routine-table">`;
                scheduleItems.forEach((item, index) => {
                    tableHTML += `
                        <tr class="routine-row">
                            <td class="routine-cell cell-editable" contenteditable="true" onblur="updateItemTime(${index}, this.innerText)">${item.time}</td>
                            <td class="routine-cell cell-editable" contenteditable="true" onblur="updateItemText(${index}, this.innerText)">${item.text}</td>
                            <td class="routine-cell" style="width: 50px;">
                                <button class="action-btn" onclick="removeScheduleItem(${index})">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
                tableHTML += `</table>`;
                renderArea.innerHTML = tableHTML;
            }
        }

        // Image uploads inside layouts
        function uploadTimelineImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('timelineFrameImg').src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // Export Canvas to beautiful image
        function exportScheduleImage() {
            const canvas = document.getElementById('scheduleCanvas');
            html2canvas(canvas, { scale: 2 }).then(canvasImage => {
                const link = document.createElement('a');
                link.download = 'my-aesthetic-schedule.png';
                link.href = canvasImage.toDataURL();
                link.click();
            });
        }


        // --- CORKBOARD DRAG & DROP CORE ---
        let draggedElement = null;
        let offsetX = 0;
        let offsetY = 0;

        function dragStart(e) {
            draggedElement = e.currentTarget;
            
            // Bring to front
            const allItems = document.querySelectorAll('.board-item');
            allItems.forEach(item => item.style.zIndex = 1);
            draggedElement.style.zIndex = 10;

            const rect = draggedElement.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', dragEnd);
        }

        function dragMove(e) {
            if (!draggedElement) return;
            const canvas = document.getElementById('boardCanvas');
            const canvasRect = canvas.getBoundingClientRect();
            
            let x = e.clientX - canvasRect.left - offsetX;
            let y = e.clientY - canvasRect.top - offsetY;

            // Bounds constraint
            x = Math.max(0, Math.min(x, canvasRect.width - draggedElement.offsetWidth));
            y = Math.max(0, Math.min(y, canvasRect.height - draggedElement.offsetHeight));

            draggedElement.style.left = x + 'px';
            draggedElement.style.top = y + 'px';
        }

        function dragEnd() {
            draggedElement = null;
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('mouseup', dragEnd);
        }

        // Add elements to Corkboard
        function addStickyNote(bgColor) {
            const board = document.getElementById('boardCanvas');
            const note = document.createElement('div');
            note.className = 'board-item';
            note.style.top = '150px';
            note.style.left = '150px';
            note.style.transform = `rotate(${(Math.random() * 10 - 5)}deg)`;
            note.onmousedown = dragStart;

            note.innerHTML = `
                <div class="item-control-overlay">
                    <button class="btn-mini" onclick="rotateItem(this.parentNode.parentNode, 15)">🔄</button>
                    <button class="btn-mini" onclick="this.parentNode.parentNode.remove()">❌</button>
                </div>
                <div class="sticky-note" style="background-color: ${bgColor};">
                    <div class="sticky-note-text" contenteditable="true">كتابة هنا... ✨</div>
                </div>
            `;
            board.appendChild(note);
        }

        function uploadBoardImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    createPolaroidOnBoard(e.target.result);
                }
                reader.readAsDataURL(file);
            }
        }

        function createPolaroidOnBoard(imgSrc) {
            const board = document.getElementById('boardCanvas');
            const card = document.createElement('div');
            card.className = 'board-item';
            card.style.top = '200px';
            card.style.left = '200px';
            card.style.transform = `rotate(${(Math.random() * 12 - 6)}deg)`;
            card.onmousedown = dragStart;

            card.innerHTML = `
                <div class="item-control-overlay">
                    <button class="btn-mini" onclick="rotateItem(this.parentNode.parentNode, 15)">🔄</button>
                    <button class="btn-mini" onclick="this.parentNode.parentNode.remove()">❌</button>
                </div>
                <div class="polaroid">
                    <img src="${imgSrc}" alt="User board image">
                    <div class="polaroid-caption" contenteditable="true">ذكرى لطيفة 🌸</div>
                </div>
            `;
            board.appendChild(card);
        }

        function addSticker(emoji) {
            const board = document.getElementById('boardCanvas');
            const sticker = document.createElement('div');
            sticker.className = 'board-item sticker';
            sticker.style.top = '100px';
            sticker.style.left = '300px';
            sticker.style.transform = `rotate(${(Math.random() * 20 - 10)}deg)`;
            sticker.onmousedown = dragStart;

            sticker.innerHTML = `
                <div class="item-control-overlay">
                    <button class="btn-mini" onclick="rotateItem(this.parentNode.parentNode, 15)">🔄</button>
                    <button class="btn-mini" onclick="this.parentNode.parentNode.remove()">❌</button>
                </div>
                ${emoji}
            `;
            board.appendChild(sticker);
        }

        function rotateItem(item, amount) {
            // Get current rotation
            const style = window.getComputedStyle(item);
            const matrix = style.transform || style.webkitTransform || style.mozTransform;
            let angle = 0;
            if (matrix && matrix !== 'none') {
                const values = matrix.split('(')[1].split(')')[0].split(',');
                const a = values[0];
                const b = values[1];
                angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
            }
            const newAngle = angle + amount;
            item.style.transform = `rotate(${newAngle}deg)`;
        }

        function clearBoard() {
            if (confirm("هل تريد إزالة جميع العناصر من اللوحة الفنية؟")) {
                document.getElementById('boardCanvas').innerHTML = '';
            }
        }

        // Initialize App
        window.onload = () => {
            renderSchedule();
        }
    </script>
</body>
</html>
